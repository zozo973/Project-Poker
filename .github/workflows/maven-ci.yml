name: Maven CI + JavaDocs

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run full test suite
        run: ./mvnw -B -ntp clean test

  javadocs:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Generate JavaDocs
        run: ./mvnw -B -ntp -DskipTests javadoc:javadoc

      - name: Upload JavaDocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadocs
          path: target/site/apidocs
          if-no-files-found: error

